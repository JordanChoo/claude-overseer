# Prompt list for auto-prompter agent
# Format:
#   ntm:<palette_name>    — sends via NTM palette (~/.config/ntm/palettes/<name>.md)
#   custom:<prompt_name>  — sends inline prompt from custom-prompts.md
#
# Lines starting with # are comments. Blank lines are ignored.

ntm:next_bead
ntm:work_on_your_beads
ntm:do_all_of_it
custom:check-mail-and-continue
